<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 56" width="224" height="56" role="img" aria-label="Man and Van Manchester">
  <title>Man and Van Manchester</title>
  <!-- Logo mark: blue square -->
  <rect x="0" y="4" width="48" height="48" rx="10" fill="#2563EB"/>
  <!-- Van silhouette (white) -->
  <!-- Cargo body -->
  <rect x="4" y="16" width="26" height="20" rx="3" fill="white"/>
  <!-- Cab -->
  <rect x="30" y="20" width="16" height="16" rx="2" fill="white"/>
  <!-- Windshield (blue cutout) -->
  <rect x="32" y="22" width="12" height="9" rx="1" fill="#2563EB"/>
  <!-- Door line -->
  <rect x="18" y="16" width="1.5" height="20" fill="#2563EB"/>
  <!-- Wheels -->
  <circle cx="11" cy="38" r="5" fill="#1e3a8a"/>
  <circle cx="38" cy="38" r="5" fill="#1e3a8a"/>
  <circle cx="11" cy="38" r="2.5" fill="white"/>
  <circle cx="38" cy="38" r="2.5" fill="white"/>
  <!-- Brand text -->
  <text x="58" y="26" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="17" font-weight="900" fill="#111827" letter-spacing="-0.3">Man &amp; Van</text>
  <text x="58" y="44" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="13" font-weight="700" fill="#2563EB" letter-spacing="1.5">MANCHESTER</text>
</svg>
